<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我們要結婚了</title>

<style>
body { margin:0; font-family:Arial; }

.page {
  display:none;
  min-height:100vh;
  justify-content:center;
  align-items:center;
  background-size:cover;
  background-position:center;
  color:white;
}

.active { display:flex; }

.card {
  background:rgba(0,0,0,0.5);
  padding:30px;
  border-radius:15px;
  width:90%;
  max-width:500px;
}

input, select {
  width:100%;
  padding:10px;
  margin-top:10px;
}

button {
  margin-top:15px;
  padding:10px;
  width:100%;
}
</style>
</head>

<body>

<!-- Page1 -->
<div id="page1" class="page active" style="background-image:url('LZ8_2715.JPEG')">
  <div class="card">
    <h1>我們要結婚了</h1>
    <p>誠摯邀請您見證我們的重要時刻</p>
    <button onclick="goToPage(2)">登記</button>
  </div>
</div>

<!-- Page2 -->
<div id="page2" class="page" style="background-image:url('JAY00218.JPEG')">
  <div class="card">
    <h2>填寫出席資訊</h2>

    <input id="guestName" placeholder="姓名">

    <select id="relationship">
      <option value="">選擇關係</option>
      <option>新郎朋友</option>
      <option>新娘朋友</option>
    </select>

    <select id="attendance">
      <option value="">是否出席</option>
      <option>出席</option>
      <option>不出席</option>
    </select>

    <input id="guestCount" type="number" value="1">
    <input id="childSeat" type="number" value="0">
    <input id="vegetarian" type="number" value="0">

    <input id="email" placeholder="Email" oninput="resetEmailVerification()">

    <button onclick="sendEmailCode()">寄送驗證碼</button>

    <input id="emailCode" placeholder="輸入驗證碼">
    <button onclick="verifyEmailCode()">驗證</button>

    <p id="emailVerifyStatus">尚未驗證</p>

    <button onclick="submitData()">送出</button>
  </div>
</div>

<!-- Page3 -->
<div id="page3" class="page" style="background-image:url('LZ8_2226.JPEG')">
  <div class="card">
    <h2>資料確認</h2>
    <div id="summary"></div>
    <button onclick="goToPage(2)">修改</button>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxbvMX2U-kp1cxDMBZ-7EuQ39Ec6xCupT5pXutbDKn1U7FtaDrKHDCaVLz5owHGz3X87A/exec";

let verifiedEmail = "";
let isEmailVerified = false;

/* ===== 頁面切換 ===== */
function goToPage(p){
  document.querySelectorAll(".page").forEach(el=>el.classList.remove("active"));
  document.getElementById("page"+p).classList.add("active");
}

/* ===== token 自動跳頁（放這裡才對） ===== */
window.addEventListener("load", function () {
  const token = new URLSearchParams(window.location.search).get("token");
  if (token) {
    console.log("token:", token);
    goToPage(2);
  }
});

/* ===== Email 重置 ===== */
function resetEmailVerification(){
  isEmailVerified=false;
  document.getElementById("emailVerifyStatus").innerText="尚未驗證";
}

/* ===== 寄驗證碼 ===== */
function sendEmailCode(){
  const email=document.getElementById("email").value;

  fetch(GAS_URL,{
    method:"POST",
    body:JSON.stringify({action:"sendCode",email})
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.status==="success"){
      alert("已寄出");
    }else{
      alert("失敗");
    }
  })
}

/* ===== 驗證碼 ===== */
function verifyEmailCode(){
  const email=document.getElementById("email").value;
  const code=document.getElementById("emailCode").value;

  fetch(GAS_URL,{
    method:"POST",
    body:JSON.stringify({action:"verifyCode",email,code})
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.status==="success"){
      isEmailVerified=true;
      verifiedEmail=email;
      document.getElementById("emailVerifyStatus").innerText="驗證成功";
    }else{
      alert("錯誤");
    }
  })
}

/* ===== 送出 ===== */
function submitData(){

  if(!isEmailVerified){
    alert("請先驗證Email");
    return;
  }

  const data={
    name:guestName.value,
    relationship:relationship.value,
    attendance:attendance.value,
    guestCount:guestCount.value,
    childSeat:childSeat.value,
    vegetarian:vegetarian.value,
    email:email.value
  };

  fetch(GAS_URL,{
    method:"POST",
    body:JSON.stringify({action:"submit",...data})
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.status==="success"){
      summary.innerHTML=JSON.stringify(data,null,2);
      goToPage(3);
    }
  })
}
</script>

</body>
</html>
