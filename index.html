<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: #333;
      background: #f6f1ec;
    }

    body { overflow-x: hidden; }

    .page {
      display: none;
      min-height: 100svh;
      padding: max(20px, env(safe-area-inset-top)) 14px max(24px, env(safe-area-inset-bottom));
      justify-content: center;
      align-items: center;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .page.active { display: flex; }

    #page1 {
      background-image:
        linear-gradient(rgba(0,0,0,0.36), rgba(0,0,0,0.48)),
        url("./LZ8_2715.JPEG");
    }

    #page2 {
      background-image:
        linear-gradient(rgba(0,0,0,0.36), rgba(0,0,0,0.48)),
        url("./JAY00218.JPEG");
    }

    #page3 {
      background-image:
        linear-gradient(rgba(0,0,0,0.36), rgba(0,0,0,0.48)),
        url("./LZ8_2226.JPEG");
    }

    .card {
      width: min(100%, 680px);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }

    h1 {
      text-align: center;
      margin: 0 0 22px;
      font-size: clamp(1.7rem, 7vw, 2.2rem);
      line-height: 1.35;
      letter-spacing: 0.08em;
    }

    p {
      line-height: 1.85;
      font-size: 1.05rem;
      margin: 0 0 18px;
    }

    .info {
      line-height: 1.9;
      margin-bottom: 24px;
      font-size: 1rem;
    }

    .info div { margin-bottom: 4px; }

    label {
      display: block;
      margin-top: 18px;
      font-weight: 700;
      line-height: 1.5;
    }

    input, select {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      margin-top: 8px;
      border-radius: 12px;
      border: 1px solid #bbb;
      font-size: 16px;
      background: #fff;
      color: #333;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #7b4f3a;
      box-shadow: 0 0 0 3px rgba(123,79,58,0.18);
    }

    .map-links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 14px 0 20px;
    }

    .map-links a {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border-radius: 999px;
      background: rgba(123,79,58,0.12);
      color: #5a3e2b;
      font-weight: 700;
      text-decoration: none;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 28px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      min-height: 48px;
      padding: 13px 28px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: #7b4f3a;
      color: white;
      transition: 0.2s;
    }

    button:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    button.secondary { background: #777; }

    .summary {
      line-height: 2;
      font-size: 1.05rem;
      word-break: break-word;
    }

    .summary strong {
      display: inline-block;
      min-width: 150px;
    }

    .summary-section {
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(0,0,0,0.12);
    }

    .countdown-wrap {
      display: none;
      text-align: center;
      margin: 0 0 22px;
      padding: 16px 12px;
      border-radius: 18px;
      background: rgba(123,79,58,0.10);
    }

    .countdown-title {
      font-weight: 800;
      color: #5a3e2b;
      margin-bottom: 10px;
      letter-spacing: 0.08em;
    }

    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: center;
      gap: 8px;
    }

    .countdown-number {
      font-size: clamp(1.55rem, 8vw, 2.4rem);
      font-weight: 800;
      line-height: 1.1;
      color: #5a3e2b;
    }

    .countdown-label {
      font-size: 0.9rem;
      margin-top: 6px;
      color: #6b5142;
    }

    .photo-link, .seat-map-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      margin-top: 8px;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(123,79,58,0.12);
      color: #5a3e2b;
      font-weight: 700;
      text-decoration: none;
    }

    #emailVerifyStatus {
      text-align: center;
      font-weight: 700;
      margin: 14px 0 0;
      color: #b65b00;
    }

    .custom-alert {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0,0,0,0.45);
      z-index: 9999;
    }

    .custom-alert.active { display: flex; }

    .custom-alert-box {
      width: min(100%, 360px);
      background: #fff;
      border-radius: 20px;
      padding: 24px 20px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
      text-align: center;
    }

    .custom-alert-box h2 {
      margin: 0 0 12px;
      font-size: 1.25rem;
      color: #5a3e2b;
    }

    .custom-alert-box p {
      margin: 0;
      font-size: 1rem;
      line-height: 1.7;
    }

    .custom-alert-box button {
      margin-top: 20px;
      width: 100%;
    }

    @media (max-width: 600px) {
      .page {
        align-items: flex-start;
        padding-left: 12px;
        padding-right: 12px;
      }

      .card {
        margin: 0 auto;
        padding: 24px 18px;
        border-radius: 20px;
      }

      p, .info, .summary { font-size: 0.98rem; }

      .buttons {
        width: 100%;
        gap: 10px;
        margin-top: 22px;
      }

      .buttons button { width: 100%; }

      .map-links { grid-template-columns: 1fr 1fr; }

      .summary strong {
        display: block;
        min-width: 0;
        margin-top: 10px;
      }
    }

    @media (max-width: 390px) {
      .card { padding: 22px 16px; }
      h1 { letter-spacing: 0.05em; }
    }
  </style>
</head>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxbvMX2U-kp1cxDMBZ-7EuQ39Ec6xCupT5pXutbDKn1U7FtaDrKHDCaVLz5owHGz3X87A/exec";

    const WEDDING_DATE = "2026?11?7????";
    const WEDDING_TIME = "12:00 ?????12:30 ????";
    const WEDDING_LOCATION = "251?????????382?";
    const WEDDING_TRAFFIC = "??????????????????????????????";
    const GOOGLE_MAP_URL = "https://www.google.com/maps/place/%E5%98%89%F0%A0%AB%82/@25.1757864,121.4268743,17z/data=!4m6!3m5!1s0x3442a58fddc78345:0x3e5f1ce27904fdee!8m2!3d25.1757864!4d121.4294492!16s%2Fg%2F11fm5c0fb2?entry=ttu&g_ep=EgoyMDI2MDQyOS4wIKXMDSoASAFQAw%3D%3D";
    const APPLE_MAP_URL = "https://maps.apple.com/?address=No.%20382%20Zhongzheng%20Rd,%20Tamsui%20District,%20New%20Taipei%20City%20251018,%20Taiwan&auid=5081677717952371797&ll=25.175772,121.429802&lsp=9902&q=%E8%B1%AA%E9%82%B8%E5%98%89%F0%A0%AB%82";
    const SEAT_MAP_IMAGE_URL = "https://x87gp6.github.io/seat-map.jpg";
    const PHOTO_ALBUM_URL = "https://x87gp6.github.io/photos";

    const EDIT_LOCK_TIME = new Date("2026-11-05T12:00:00+08:00");
    const WEDDING_START_TIME = new Date("2026-11-07T12:00:00+08:00");
    const THANK_YOU_TIME = new Date("2026-11-10T12:00:00+08:00");
    let countdownTimer = null;

    let formData = {};
    let verifiedEmail = "";
    let isEmailVerified = false;
    let currentToken = "";

    function showMessage(message) {
      document.getElementById("customAlertText").innerText = message;
      document.getElementById("customAlert").classList.add("active");
    }

    function closeMessage() {
      document.getElementById("customAlert").classList.remove("active");
    }

    function getTokenFromUrl() {
      const searchToken = new URLSearchParams(window.location.search).get("token");
      if (searchToken) return searchToken;

      const hashText = window.location.hash.replace("#", "");
      const hashToken = new URLSearchParams(hashText).get("token");
      if (hashToken) return hashToken;

      return "";
    }

    function initNumberSelects() {
      const ids = ["guestCount", "childSeat", "vegetarian"];

      ids.forEach(id => {
        const select = document.getElementById(id);
        select.innerHTML = "";

        for (let i = 0; i <= 20; i++) {
          const option = document.createElement("option");
          option.value = i;
          option.textContent = i;
          select.appendChild(option);
        }
      });

      document.getElementById("guestCount").value = 1;
      document.getElementById("childSeat").value = 0;
      document.getElementById("vegetarian").value = 0;
    }

    function goToPage(pageNumber) {
      document.querySelectorAll(".page").forEach(page => {
        page.classList.remove("active");
      });

      document.getElementById("page" + pageNumber).classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function editData() {
      if (isAfterEditLock()) {
        showMessage("???????????????????? Email ??????");
        updatePage3Mode(formData);
        return;
      }

      fillFormData(formData);
      goToPage(2);
    }

    function isAttending() {
      const attendance = document.getElementById("attendance").value;
      return attendance.includes("??") && !attendance.includes("??");
    }

    function toggleAttendanceDetails() {
      const details = document.getElementById("attendanceDetails");
      const guestCount = document.getElementById("guestCount");
      const childSeat = document.getElementById("childSeat");
      const vegetarian = document.getElementById("vegetarian");

      if (isAttending()) {
        details.style.display = "block";
        guestCount.required = true;
        childSeat.required = true;
        vegetarian.required = true;

        if (Number(guestCount.value) < 1) {
          guestCount.value = 1;
        }
      } else {
        details.style.display = "none";
        guestCount.required = false;
        childSeat.required = false;
        vegetarian.required = false;

        guestCount.value = 0;
        childSeat.value = 0;
        vegetarian.value = 0;
      }
    }

    function resetEmailVerification() {
      const currentEmail = document.getElementById("email").value.trim();

      if (currentEmail !== verifiedEmail) {
        isEmailVerified = false;

        const status = document.getElementById("emailVerifyStatus");
        status.innerText = "Email ????";
        status.style.color = "#b65b00";
      }
    }

    function isAfterEditLock() {
      return new Date() >= EDIT_LOCK_TIME;
    }

    function isAfterThankYouTime() {
      return new Date() >= THANK_YOU_TIME;
    }

    function updatePage3Mode(data) {
      const title = document.getElementById("page3Title");
      const intro = document.getElementById("page3Intro");
      const editWrap = document.getElementById("editButtonWrap");

      if (isAfterThankYouTime()) {
        title.innerText = "????";
        intro.innerText = "?????????????????????????????????????????????";
        editWrap.style.display = "none";
        renderThankYou();
        return;
      }

      title.innerText = "????????";
      editWrap.style.display = isAfterEditLock() ? "none" : "flex";
      intro.innerText = isAfterEditLock()
        ? "??????????????????????????????"
        : "??????????????????????????????";

      renderSummary(data);
    }

    function renderThankYou() {
      document.getElementById("summary").innerHTML = `
        <div class="summary-section">
          <div>??????????</div>
          <div>?????????????????????????</div>
        </div>

        <div>
          <div><strong>?????</strong></div>
          <a class="photo-link" href="${PHOTO_ALBUM_URL}" target="_blank" rel="noopener">???????</a>
        </div>
      `;
    }

    function renderSummary(data) {
      const showLockedInfo = isAfterEditLock();
      const tableNoHtml = showLockedInfo
        ? `<div><strong>???</strong>${data.tableNo || "????"}</div>`
        : "";
      const seatMapHtml = showLockedInfo
        ? `<div><strong>?????</strong><br><a class="seat-map-link" href="${SEAT_MAP_IMAGE_URL}" target="_blank" rel="noopener">??????</a></div>`
        : "";

      document.getElementById("summary").innerHTML = `
        <div class="summary-section">
          <div><strong>???</strong>${WEDDING_DATE}</div>
          <div><strong>???</strong>${WEDDING_TIME}</div>
          <div><strong>?????</strong>${WEDDING_LOCATION}</div>

          <div class="map-links">
            <a href="${GOOGLE_MAP_URL}" target="_blank" rel="noopener">Google ??</a>
            <a href="${APPLE_MAP_URL}" target="_blank" rel="noopener">Apple ??</a>
          </div>

          <div><strong>???</strong>${WEDDING_TRAFFIC}</div>
        </div>

        <div>
          ${tableNoHtml}
          ${seatMapHtml}
          <div><strong>???</strong>${data.name || ""}</div>
          <div><strong>??????</strong>${data.relationship || ""}</div>
          <div><strong>?????</strong>${data.attendance || ""}</div>
          <div><strong>?????</strong>${data.guestCount ?? 0}</div>
          <div><strong>?????</strong>${data.childSeat ?? 0}</div>
          <div><strong>?????</strong>${data.vegetarian ?? 0}</div>
          <div><strong>Email?</strong>${data.email || ""}</div>
        </div>
      `;
    }

    function updateCountdown() {
      const wrap = document.getElementById("countdownWrap");
      const now = new Date();

      if (now >= WEDDING_START_TIME || now >= THANK_YOU_TIME) {
        wrap.style.display = "none";
        if (countdownTimer) clearInterval(countdownTimer);
        return;
      }

      const diff = WEDDING_START_TIME - now;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("cdDays").innerText = days;
      document.getElementById("cdHours").innerText = hours;
      document.getElementById("cdMinutes").innerText = minutes;
      document.getElementById("cdSeconds").innerText = seconds;
      wrap.style.display = "block";
    }

    function startCountdown() {
      updateCountdown();
      if (countdownTimer) clearInterval(countdownTimer);
      countdownTimer = setInterval(updateCountdown, 1000);
    }

    function fillFormData(data) {
      document.getElementById("guestName").value = data.name || "";
      document.getElementById("relationship").value = data.relationship || "";
      document.getElementById("attendance").value = data.attendance || "";

      document.getElementById("guestCount").value = String(Number(data.guestCount || 0));
      document.getElementById("childSeat").value = String(Number(data.childSeat || 0));
      document.getElementById("vegetarian").value = String(Number(data.vegetarian || 0));
      document.getElementById("email").value = data.email || "";

      isEmailVerified = true;
      verifiedEmail = data.email || "";

      const status = document.getElementById("emailVerifyStatus");
      status.innerText = "Email ???";
      status.style.color = "green";

      toggleAttendanceDetails();
    }

    function collectAndValidateForm() {
      const form = document.getElementById("rsvpForm");

      if (!form.checkValidity()) {
        form.reportValidity();
        return null;
      }

      const name = document.getElementById("guestName").value.trim();
      const relationship = document.getElementById("relationship").value;
      const attendance = document.getElementById("attendance").value;
      const email = document.getElementById("email").value.trim();

      let guestCount = 0;
      let childSeat = 0;
      let vegetarian = 0;

      if (!name) {
        showMessage("???????");
        return null;
      }

      if (!relationship) {
        showMessage("?????????");
        return null;
      }

      if (!attendance) {
        showMessage("?????????");
        return null;
      }

      if (isAttending()) {
        guestCount = Number(document.getElementById("guestCount").value);
        childSeat = Number(document.getElementById("childSeat").value);
        vegetarian = Number(document.getElementById("vegetarian").value);

        if (guestCount < 1) {
          showMessage("??????? 1 ?");
          return null;
        }

        if (childSeat > guestCount) {
          showMessage("??????????????");
          return null;
        }

        if (vegetarian > guestCount) {
          showMessage("????????????");
          return null;
        }
      }

      if (!email) {
        showMessage("??? Email");
        return null;
      }

      if (!isEmailVerified || email !== verifiedEmail) {
        showMessage("???? Email ??");
        return null;
      }

      return {
        name,
        relationship,
        attendance,
        guestCount,
        childSeat,
        vegetarian,
        email
      };
    }

    function sendEmailCode() {
      const emailInput = document.getElementById("email");
      const status = document.getElementById("emailVerifyStatus");

      if (!emailInput.checkValidity()) {
        emailInput.reportValidity();
        return;
      }

      const email = emailInput.value.trim();

      if (!email) {
        showMessage("???? Email");
        return;
      }

      status.innerText = "??????...";
      status.style.color = "#7b4f3a";

      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "sendCode",
          email: email
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === "success") {
          isEmailVerified = false;
          verifiedEmail = "";
          document.getElementById("emailCode").value = "";

          status.innerText = "????????? Email ??";
          status.style.color = "#7b4f3a";

          showMessage("????????? Email ???");
        } else {
          status.innerText = "???????";
          status.style.color = "red";
          showMessage(data.message || "???????");
        }
      })
      .catch(err => {
        console.error(err);
        status.innerText = "???????";
        status.style.color = "red";
        showMessage("?????????????");
      });
    }

    function verifyEmailCode() {
      const email = document.getElementById("email").value.trim();
      const code = document.getElementById("emailCode").value.trim();
      const status = document.getElementById("emailVerifyStatus");

      if (!email) {
        showMessage("???? Email");
        return;
      }

      if (!code) {
        showMessage("??????");
        return;
      }

      status.innerText = "???...";
      status.style.color = "#7b4f3a";

      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "verifyCode",
          email: email,
          code: code
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === "success") {
          isEmailVerified = true;
          verifiedEmail = email;

          status.innerText = "Email ????";
          status.style.color = "green";

          showMessage("Email ????");
        } else {
          isEmailVerified = false;
          verifiedEmail = "";

          status.innerText = "?????????";
          status.style.color = "red";

          showMessage(data.message || "?????????");
        }
      })
      .catch(err => {
        console.error(err);
        isEmailVerified = false;

        status.innerText = "????";
        status.style.color = "red";

        showMessage("??????????");
      });
    }

    function submitData() {
      const data = collectAndValidateForm();
      if (!data) return;

      formData = data;

      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "submit",
          token: currentToken,
          ...formData
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === "success") {
          if (data.token) {
            currentToken = data.token;
          }

          updatePage3Mode(formData);
          startCountdown();
          goToPage(3);
          showMessage("????????");
        } else {
          showMessage(data.message || "???????????");
        }
      })
      .catch(err => {
        console.error(err);
        showMessage("????????????????");
      });
    }

    window.addEventListener("load", function () {
      initNumberSelects();

      currentToken = getTokenFromUrl();

      if (currentToken) {
        fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "getData",
            token: currentToken
          })
        })
        .then(res => res.json())
        .then(data => {
          if (data.status === "success") {
            const d = data.data;

            formData = {
              name: d.name || "",
              relationship: d.relationship || "",
              attendance: d.attendance || "",
              guestCount: Number(d.guestCount || 0),
              childSeat: Number(d.childSeat || 0),
              vegetarian: Number(d.vegetarian || 0),
              email: d.email || "",
              tableNo: d.tableNo || ""
            };

            fillFormData(formData);
            updatePage3Mode(formData);
            startCountdown();
            goToPage(3);
          } else {
            showMessage("?????????????");
            goToPage(2);
          }
        })
        .catch(err => {
          console.error(err);
          showMessage("???????????????");
          goToPage(2);
        });
      } else {
        goToPage(1);
        toggleAttendanceDetails();
      }
    });
  </script>

</body>
</html>
