<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>我們要結婚了</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: #333;
      background: #f6f1ec;
    }

    body { overflow-x: hidden; }

    .page {
      display: none;
      min-height: 100svh;
      padding: max(20px, env(safe-area-inset-top)) 14px max(24px, env(safe-area-inset-bottom));
      justify-content: center;
      align-items: center;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .page.active { display: flex; }

    #page1 {
      background-image:
        linear-gradient(rgba(0,0,0,0.36), rgba(0,0,0,0.48)),
        url("./LZ8_2715.JPEG");
    }

    #page2 {
      background-image:
        linear-gradient(rgba(0,0,0,0.36), rgba(0,0,0,0.48)),
        url("./JAY00218.JPEG");
    }

    #page3 {
      background-image:
        linear-gradient(rgba(0,0,0,0.36), rgba(0,0,0,0.48)),
        url("./LZ8_2226.JPEG");
    }

    .card {
      width: min(100%, 680px);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }

    h1 {
      text-align: center;
      margin: 0 0 22px;
      font-size: clamp(1.7rem, 7vw, 2.2rem);
      line-height: 1.35;
      letter-spacing: 0.08em;
    }

    p {
      line-height: 1.85;
      font-size: 1.05rem;
      margin: 0 0 18px;
    }

    .info {
      line-height: 1.9;
      margin-bottom: 24px;
      font-size: 1rem;
    }

    .info div { margin-bottom: 4px; }

    label {
      display: block;
      margin-top: 18px;
      font-weight: 700;
      line-height: 1.5;
    }

    input, select {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      margin-top: 8px;
      border-radius: 12px;
      border: 1px solid #bbb;
      font-size: 16px;
      background: #fff;
      color: #333;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #7b4f3a;
      box-shadow: 0 0 0 3px rgba(123,79,58,0.18);
    }

    .map-links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 14px 0 20px;
    }

    .map-links a {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border-radius: 999px;
      background: rgba(123,79,58,0.12);
      color: #5a3e2b;
      font-weight: 700;
      text-decoration: none;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 28px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      min-height: 48px;
      padding: 13px 28px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: #7b4f3a;
      color: white;
      transition: 0.2s;
    }

    button:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    button.secondary { background: #777; }

    .summary {
      line-height: 2;
      font-size: 1.05rem;
      word-break: break-word;
    }

    .summary strong {
      display: inline-block;
      min-width: 150px;
    }

    .summary-section {
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(0,0,0,0.12);
    }

    #emailVerifyStatus {
      text-align: center;
      font-weight: 700;
      margin: 14px 0 0;
      color: #b65b00;
    }

    .custom-alert {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0,0,0,0.45);
      z-index: 9999;
    }

    .custom-alert.active { display: flex; }

    .custom-alert-box {
      width: min(100%, 360px);
      background: #fff;
      border-radius: 20px;
      padding: 24px 20px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
      text-align: center;
    }

    .custom-alert-box h2 {
      margin: 0 0 12px;
      font-size: 1.25rem;
      color: #5a3e2b;
    }

    .custom-alert-box p {
      margin: 0;
      font-size: 1rem;
      line-height: 1.7;
    }

    .custom-alert-box button {
      margin-top: 20px;
      width: 100%;
    }

    @media (max-width: 600px) {
      .page {
        align-items: flex-start;
        padding-left: 12px;
        padding-right: 12px;
      }

      .card {
        margin: 0 auto;
        padding: 24px 18px;
        border-radius: 20px;
      }

      p, .info, .summary { font-size: 0.98rem; }

      .buttons {
        width: 100%;
        gap: 10px;
        margin-top: 22px;
      }

      .buttons button { width: 100%; }

      .map-links { grid-template-columns: 1fr 1fr; }

      .summary strong {
        display: block;
        min-width: 0;
        margin-top: 10px;
      }
    }

    @media (max-width: 390px) {
      .card { padding: 22px 16px; }
      h1 { letter-spacing: 0.05em; }
    }
  </style>
</head>

<body>

  <section id="page1" class="page">
    <div class="card">
      <h1>我們要結婚了</h1>
      <p>
        誠摯邀請您與我們一同見證人生中重要的時刻。
        請點選下方按鈕完成出席登記，讓我們能為您安排座位與餐點。
      </p>

      <div class="buttons">
        <button type="button" onclick="goToPage(2)">登記</button>
      </div>
    </div>
  </section>

  <section id="page2" class="page">
    <div class="card">
      <h1>請協助填寫出席資訊</h1>

      <div class="info">
        <div><strong>日期：</strong>2026年11月7日（六）</div>
        <div><strong>時間：</strong>12:00 婚宴入席　12:30 婚宴開始</div>
        <div><strong>宴客地點：</strong>251新北市淡水區中正路382號</div>

        <div class="map-links">
          <a href="https://www.google.com/maps/place/%E5%98%89%F0%A0%AB%82/@25.1757864,121.4268743,17z/data=!4m6!3m5!1s0x3442a58fddc78345:0x3e5f1ce27904fdee!8m2!3d25.1757864!4d121.4294492!16s%2Fg%2F11fm5c0fb2?entry=ttu&g_ep=EgoyMDI2MDQyOS4wIKXMDSoASAFQAw%3D%3D" target="_blank">
            Google 地圖
          </a>
          <a href="https://maps.apple.com/?address=No.%20382%20Zhongzheng%20Rd,%20Tamsui%20District,%20New%20Taipei%20City%20251018,%20Taiwan&auid=5081677717952371797&ll=25.175772,121.429802&lsp=9902&q=%E8%B1%AA%E9%82%B8%E5%98%89%F0%A0%AB%82" target="_blank">
            Apple 地圖
          </a>
        </div>

        <div><strong>交通：</strong>交通資訊將於確認後補充，您可先透過上方地圖連結查看宴客地點。</div>
      </div>

      <form id="rsvpForm">
        <label>請問您的大名：</label>
        <input type="text" id="guestName" required placeholder="請輸入姓名">

        <label>與新人的關係：</label>
        <select id="relationship" required>
          <option value="">請選擇</option>
          <option>🤵新郎親戚</option>
          <option>🤵新郎同學</option>
          <option>🤵新郎同事</option>
          <option>👰新娘親戚</option>
          <option>👰新娘同學</option>
          <option>👰新娘同事</option>
          <option>其他關係</option>
        </select>

        <label>是否出席婚宴：</label>
        <select id="attendance" required onchange="toggleAttendanceDetails()">
          <option value="">請選擇</option>
          <option>⭕️ 出席</option>
          <option>❌ 無法出席</option>
        </select>

        <div id="attendanceDetails" style="display:none;">
          <label>共幾個人出席：</label>
          <select id="guestCount"></select>

          <label>需要幾張兒童座椅：</label>
          <select id="childSeat"></select>

          <label>出席的賓客有幾位需要素食：</label>
          <select id="vegetarian"></select>
        </div>

        <label>電子喜帖寄送 Email：</label>
        <input type="email" id="email" required placeholder="example@email.com" oninput="resetEmailVerification()">

        <div class="buttons" style="margin-top: 12px;">
          <button type="button" onclick="sendEmailCode()">寄送驗證碼</button>
        </div>

        <label>請輸入 Email 驗證碼：</label>
        <input type="text" id="emailCode" inputmode="numeric" pattern="[0-9]*" placeholder="請輸入 6 碼驗證碼">

        <div class="buttons" style="margin-top: 12px;">
          <button type="button" onclick="verifyEmailCode()">驗證 Email</button>
        </div>

        <p id="emailVerifyStatus">Email 尚未驗證</p>

        <div class="buttons">
          <button type="button" onclick="submitData()">送出</button>
        </div>
      </form>
    </div>
  </section>

  <section id="page3" class="page">
    <div class="card">
      <h1>您的登記資料如下</h1>

      <p>
        以下為您的出席登記資料。若需要調整內容，請點選下方「修改」。
      </p>

      <div class="summary" id="summary"></div>

      <div class="buttons">
        <button class="secondary" type="button" onclick="editData()">修改</button>
      </div>
    </div>
  </section>

  <div id="customAlert" class="custom-alert">
    <div class="custom-alert-box">
      <h2>提醒</h2>
      <p id="customAlertText"></p>
      <button type="button" onclick="closeMessage()">知道了</button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxbvMX2U-kp1cxDMBZ-7EuQ39Ec6xCupT5pXutbDKn1U7FtaDrKHDCaVLz5owHGz3X87A/exec";

    const WEDDING_DATE = "2026年11月7日（六）";
    const WEDDING_TIME = "12:00 婚宴入席　12:30 婚宴開始";
    const WEDDING_LOCATION = "251新北市淡水區中正路382號";
    const WEDDING_TRAFFIC = "交通資訊將於確認後補充，您可先透過 Google 地圖或 Apple 地圖查看宴客地點。";

    let formData = {};
    let verifiedEmail = "";
    let isEmailVerified = false;
    let currentToken = "";

    function showMessage(message) {
      document.getElementById("customAlertText").innerText = message;
      document.getElementById("customAlert").classList.add("active");
    }

    function closeMessage() {
      document.getElementById("customAlert").classList.remove("active");
    }

    function getTokenFromUrl() {
      const searchToken = new URLSearchParams(window.location.search).get("token");
      if (searchToken) return searchToken;

      const hashText = window.location.hash.replace("#", "");
      const hashToken = new URLSearchParams(hashText).get("token");
      if (hashToken) return hashToken;

      return "";
    }

    function initNumberSelects() {
      const ids = ["guestCount", "childSeat", "vegetarian"];

      ids.forEach(id => {
        const select = document.getElementById(id);
        select.innerHTML = "";

        for (let i = 0; i <= 20; i++) {
          const option = document.createElement("option");
          option.value = i;
          option.textContent = i;
          select.appendChild(option);
        }
      });

      document.getElementById("guestCount").value = 1;
      document.getElementById("childSeat").value = 0;
      document.getElementById("vegetarian").value = 0;
    }

    function goToPage(pageNumber) {
      document.querySelectorAll(".page").forEach(page => {
        page.classList.remove("active");
      });

      document.getElementById("page" + pageNumber).classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function editData() {
      fillFormData(formData);
      goToPage(2);
    }

    function isAttending() {
      const attendance = document.getElementById("attendance").value;
      return attendance.includes("出席") && !attendance.includes("無法");
    }

    function toggleAttendanceDetails() {
      const details = document.getElementById("attendanceDetails");
      const guestCount = document.getElementById("guestCount");
      const childSeat = document.getElementById("childSeat");
      const vegetarian = document.getElementById("vegetarian");

      if (isAttending()) {
        details.style.display = "block";
        guestCount.required = true;
        childSeat.required = true;
        vegetarian.required = true;

        if (Number(guestCount.value) < 1) {
          guestCount.value = 1;
        }
      } else {
        details.style.display = "none";
        guestCount.required = false;
        childSeat.required = false;
        vegetarian.required = false;

        guestCount.value = 0;
        childSeat.value = 0;
        vegetarian.value = 0;
      }
    }

    function resetEmailVerification() {
      const currentEmail = document.getElementById("email").value.trim();

      if (currentEmail !== verifiedEmail) {
        isEmailVerified = false;

        const status = document.getElementById("emailVerifyStatus");
        status.innerText = "Email 尚未驗證";
        status.style.color = "#b65b00";
      }
    }

    function renderSummary(data) {
      document.getElementById("summary").innerHTML = `
        <div class="summary-section">
          <div><strong>日期：</strong>${WEDDING_DATE}</div>
          <div><strong>時間：</strong>${WEDDING_TIME}</div>
          <div><strong>地點：</strong>${WEDDING_LOCATION}</div>
          <div><strong>交通：</strong>${WEDDING_TRAFFIC}</div>
          <div><strong>Email：</strong>${data.email || ""}</div>
        </div>

        <div>
          <div><strong>姓名：</strong>${data.name || ""}</div>
          <div><strong>與新人關係：</strong>${data.relationship || ""}</div>
          <div><strong>是否出席：</strong>${data.attendance || ""}</div>
          <div><strong>出席人數：</strong>${data.guestCount ?? 0}</div>
          <div><strong>兒童座椅：</strong>${data.childSeat ?? 0}</div>
          <div><strong>素食人數：</strong>${data.vegetarian ?? 0}</div>
        </div>
      `;
    }

    function fillFormData(data) {
      document.getElementById("guestName").value = data.name || "";
      document.getElementById("relationship").value = data.relationship || "";
      document.getElementById("attendance").value = data.attendance || "";

      document.getElementById("guestCount").value = String(Number(data.guestCount || 0));
      document.getElementById("childSeat").value = String(Number(data.childSeat || 0));
      document.getElementById("vegetarian").value = String(Number(data.vegetarian || 0));
      document.getElementById("email").value = data.email || "";

      isEmailVerified = true;
      verifiedEmail = data.email || "";

      const status = document.getElementById("emailVerifyStatus");
      status.innerText = "Email 已驗證";
      status.style.color = "green";

      toggleAttendanceDetails();
    }

    function collectAndValidateForm() {
      const form = document.getElementById("rsvpForm");

      if (!form.checkValidity()) {
        form.reportValidity();
        return null;
      }

      const name = document.getElementById("guestName").value.trim();
      const relationship = document.getElementById("relationship").value;
      const attendance = document.getElementById("attendance").value;
      const email = document.getElementById("email").value.trim();

      let guestCount = 0;
      let childSeat = 0;
      let vegetarian = 0;

      if (!name) {
        showMessage("請填寫您的大名");
        return null;
      }

      if (!relationship) {
        showMessage("請選擇與新人的關係");
        return null;
      }

      if (!attendance) {
        showMessage("請選擇是否出席婚宴");
        return null;
      }

      if (isAttending()) {
        guestCount = Number(document.getElementById("guestCount").value);
        childSeat = Number(document.getElementById("childSeat").value);
        vegetarian = Number(document.getElementById("vegetarian").value);

        if (guestCount < 1) {
          showMessage("出席人數至少為 1 人");
          return null;
        }

        if (childSeat > guestCount) {
          showMessage("兒童座椅數量不可大於出席人數");
          return null;
        }

        if (vegetarian > guestCount) {
          showMessage("素食人數不可大於出席人數");
          return null;
        }
      }

      if (!email) {
        showMessage("請填寫 Email");
        return null;
      }

      if (!isEmailVerified || email !== verifiedEmail) {
        showMessage("請先完成 Email 驗證");
        return null;
      }

      return {
        name,
        relationship,
        attendance,
        guestCount,
        childSeat,
        vegetarian,
        email
      };
    }

    function sendEmailCode() {
      const emailInput = document.getElementById("email");
      const status = document.getElementById("emailVerifyStatus");

      if (!emailInput.checkValidity()) {
        emailInput.reportValidity();
        return;
      }

      const email = emailInput.value.trim();

      if (!email) {
        showMessage("請先填寫 Email");
        return;
      }

      status.innerText = "驗證碼寄送中...";
      status.style.color = "#7b4f3a";

      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "sendCode",
          email: email
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === "success") {
          isEmailVerified = false;
          verifiedEmail = "";
          document.getElementById("emailCode").value = "";

          status.innerText = "驗證碼已寄出，請至 Email 查看";
          status.style.color = "#7b4f3a";

          showMessage("驗證碼已寄出，請至 Email 查看。");
        } else {
          status.innerText = "驗證碼寄送失敗";
          status.style.color = "red";
          showMessage(data.message || "驗證碼寄送失敗");
        }
      })
      .catch(err => {
        console.error(err);
        status.innerText = "驗證碼寄送失敗";
        status.style.color = "red";
        showMessage("驗證碼寄送失敗，請稍後再試");
      });
    }

    function verifyEmailCode() {
      const email = document.getElementById("email").value.trim();
      const code = document.getElementById("emailCode").value.trim();
      const status = document.getElementById("emailVerifyStatus");

      if (!email) {
        showMessage("請先填寫 Email");
        return;
      }

      if (!code) {
        showMessage("請輸入驗證碼");
        return;
      }

      status.innerText = "驗證中...";
      status.style.color = "#7b4f3a";

      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "verifyCode",
          email: email,
          code: code
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === "success") {
          isEmailVerified = true;
          verifiedEmail = email;

          status.innerText = "Email 驗證成功";
          status.style.color = "green";

          showMessage("Email 驗證成功");
        } else {
          isEmailVerified = false;
          verifiedEmail = "";

          status.innerText = "驗證碼錯誤或已失效";
          status.style.color = "red";

          showMessage(data.message || "驗證碼錯誤或已失效");
        }
      })
      .catch(err => {
        console.error(err);
        isEmailVerified = false;

        status.innerText = "驗證失敗";
        status.style.color = "red";

        showMessage("驗證失敗，請稍後再試");
      });
    }

    function submitData() {
      const data = collectAndValidateForm();
      if (!data) return;

      formData = data;

      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "submit",
          token: currentToken,
          ...formData
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === "success") {
          if (data.token) {
            currentToken = data.token;
          }

          renderSummary(formData);
          goToPage(3);
          showMessage("登記資料已送出。");
        } else {
          showMessage(data.message || "送出失敗，請稍後再試。");
        }
      })
      .catch(err => {
        console.error(err);
        showMessage("送出失敗，請確認網路或稍後再試。");
      });
    }

    window.addEventListener("load", function () {
      initNumberSelects();

      currentToken = getTokenFromUrl();

      if (currentToken) {
        fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "getData",
            token: currentToken
          })
        })
        .then(res => res.json())
        .then(data => {
          if (data.status === "success") {
            const d = data.data;

            formData = {
              name: d.name || "",
              relationship: d.relationship || "",
              attendance: d.attendance || "",
              guestCount: Number(d.guestCount || 0),
              childSeat: Number(d.childSeat || 0),
              vegetarian: Number(d.vegetarian || 0),
              email: d.email || ""
            };

            fillFormData(formData);
            renderSummary(formData);
            goToPage(3);
          } else {
            showMessage("查無登記資料，請重新填寫。");
            goToPage(2);
          }
        })
        .catch(err => {
          console.error(err);
          showMessage("載入登記資料失敗，請稍後再試。");
          goToPage(2);
        });
      } else {
        goToPage(1);
        toggleAttendanceDetails();
      }
    });
  </script>

</body>
</html>
