<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>我們要結婚了</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: #333;
      background: #f6f1ec;
    }

    body { overflow-x: hidden; }

    .page {
      display: none;
      min-height: 100svh;
      padding: max(20px, env(safe-area-inset-top)) 14px max(24px, env(safe-area-inset-bottom));
      justify-content: center;
      align-items: center;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .page.active { display: flex; }

    #page1 {
      background-image:
        linear-gradient(rgba(0,0,0,0.36), rgba(0,0,0,0.48)),
        url("./P1a.jpg");
    }

    #page2 {
      background-image:
        linear-gradient(rgba(0,0,0,0.36), rgba(0,0,0,0.48)),
        url("./P2a.jpeg");
    }

    #page3 {
      background-image:
        linear-gradient(rgba(0,0,0,0.36), rgba(0,0,0,0.48)),
        url("./P3a.jpeg");
    }

    .card {
      width: min(100%, 680px, calc((100svh - 44px) * 9 / 19.5));
      height: min(calc(100svh - 44px), calc((100vw - 28px) * 19.5 / 9));
      aspect-ratio: 9 / 19.5;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background-color: rgba(255,255,255,0.9);
      background-size: cover;
      background-position: center bottom;
      background-repeat: no-repeat;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 44px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }

    #page1 .card { background-image: linear-gradient(rgba(255,255,255,0.78), rgba(255,255,255,0.9)), url("./p1b.jpg"); }
    #page2 .card { background-image: linear-gradient(rgba(255,255,255,0.80), rgba(255,255,255,0.92)), url("./p2b.jpg"); }
    #page3 .card { background-image: linear-gradient(rgba(255,255,255,0.80), rgba(255,255,255,0.92)), url("./p3b.jpg"); }
    #page3 .card.thanks-bg { background-image: linear-gradient(rgba(255,255,255,0.78), rgba(255,255,255,0.90)), url("./P3c.jpg"); }

    .card-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      padding: 32px;
    }

    .card-scroll::-webkit-scrollbar { width: 0; height: 0; }

    h1 {
      text-align: center;
      margin: 0 0 22px;
      font-size: clamp(1.7rem, 7vw, 2.2rem);
      line-height: 1.35;
      letter-spacing: 0.08em;
    }

    p {
      line-height: 1.85;
      font-size: 1.05rem;
      margin: 0 0 18px;
    }

    .info {
      line-height: 1.9;
      margin-bottom: 24px;
      font-size: 1rem;
    }

    .info div { margin-bottom: 4px; }

    label {
      display: block;
      margin-top: 18px;
      font-weight: 700;
      line-height: 1.5;
    }

    input, select {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      margin-top: 8px;
      border-radius: 12px;
      border: 1px solid #bbb;
      font-size: 16px;
      background: #fff;
      color: #333;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #7b4f3a;
      box-shadow: 0 0 0 3px rgba(123,79,58,0.18);
    }

    .map-links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 14px 0 20px;
    }

    .map-links a {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border-radius: 999px;
      background: rgba(123,79,58,0.12);
      color: #5a3e2b;
      font-weight: 700;
      text-decoration: none;
      transition: background-color 0.16s ease, transform 0.12s ease, box-shadow 0.16s ease;
    }

    .map-links a:hover,
    .map-links a:focus-visible {
      background: rgba(123,79,58,0.22);
      box-shadow: 0 5px 14px rgba(123,79,58,0.16);
    }

    .map-links a:active {
      background: rgba(123,79,58,0.32);
      transform: scale(0.97);
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 28px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      min-height: 48px;
      padding: 13px 28px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: #7b4f3a;
      color: white;
      transition: background-color 0.16s ease, transform 0.12s ease, box-shadow 0.16s ease, opacity 0.16s ease;
      box-shadow: 0 5px 14px rgba(123,79,58,0.22);
    }

    button:hover,
    button:focus-visible {
      background: #5f3a2a;
      box-shadow: 0 7px 18px rgba(95,58,42,0.32);
    }

    button:active,
    button.pressed {
      background: #3f261c;
      transform: scale(0.96);
      box-shadow: inset 0 3px 8px rgba(0,0,0,0.28);
      opacity: 1;
    }

    button.secondary { background: #777; box-shadow: 0 5px 14px rgba(0,0,0,0.16); }
    button.secondary:hover,
    button.secondary:focus-visible { background: #555; }
    button.secondary:active,
    button.secondary.pressed { background: #333; }

    .summary {
      line-height: 2;
      font-size: 1.05rem;
      word-break: break-word;
    }

    .summary strong {
      display: inline-block;
      min-width: 150px;
    }

    .summary-section {
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(0,0,0,0.12);
    }

    .countdown-wrap {
      display: none;
      text-align: center;
      margin: 0 0 22px;
      padding: 16px 12px;
      border-radius: 18px;
      background: rgba(123,79,58,0.10);
    }

    .countdown-title {
      font-weight: 800;
      color: #5a3e2b;
      margin-bottom: 10px;
      letter-spacing: 0.08em;
    }

    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: center;
      gap: 8px;
    }

    .countdown-number {
      font-size: clamp(1.55rem, 8vw, 2.4rem);
      font-weight: 800;
      line-height: 1.1;
      color: #5a3e2b;
    }

    .countdown-label {
      font-size: 0.9rem;
      margin-top: 6px;
      color: #6b5142;
    }

    .photo-link, .seat-map-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      margin-top: 8px;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(123,79,58,0.12);
      color: #5a3e2b;
      font-weight: 700;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background-color 0.16s ease, transform 0.12s ease, box-shadow 0.16s ease;
    }

    .photo-link:hover, .seat-map-link:hover,
    .photo-link:focus-visible, .seat-map-link:focus-visible {
      background: rgba(123,79,58,0.22);
      box-shadow: 0 5px 14px rgba(123,79,58,0.16);
    }

    .photo-link:active, .seat-map-link:active {
      background: rgba(123,79,58,0.32);
      transform: scale(0.97);
    }

    .email-label-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-top: 18px;
      font-weight: 700;
      line-height: 1.5;
      flex-wrap: wrap;
    }

    .email-label-row label {
      margin-top: 0;
    }

    #emailVerifyStatus {
      font-size: 0.92rem;
      font-weight: 800;
      color: #b65b00;
      white-space: nowrap;
    }

    .verify-modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .verify-modal-actions button {
      width: 100%;
      margin-top: 0;
      padding-left: 18px;
      padding-right: 18px;
    }

    .custom-alert {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0,0,0,0.45);
      z-index: 9999;
    }

    .custom-alert.active { display: flex; }

    .custom-alert-box {
      width: min(100%, 360px);
      background: #fff;
      border-radius: 20px;
      padding: 24px 20px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
      text-align: center;
    }

    .custom-alert-box h2 {
      margin: 0 0 12px;
      font-size: 1.25rem;
      color: #5a3e2b;
    }

    .custom-alert-box p {
      margin: 0;
      font-size: 1rem;
      line-height: 1.7;
    }

    .custom-alert-box button {
      margin-top: 20px;
      width: 100%;
    }

    .seat-map-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0,0,0,0.64);
      z-index: 10000;
    }

    .seat-map-modal.active { display: flex; }

    .seat-map-box {
      width: min(100%, 920px);
      max-height: 92svh;
      background: #fff;
      border-radius: 20px;
      padding: 14px;
      box-shadow: 0 14px 48px rgba(0,0,0,0.38);
      text-align: center;
    }

    .seat-map-box img {
      width: 100%;
      max-height: calc(92svh - 88px);
      object-fit: contain;
      border-radius: 12px;
      display: block;
      background: #f6f1ec;
    }

    .seat-map-close {
      width: 100%;
      margin-top: 12px;
    }

    .seat-map-link {
      display: flex;
      align-items: center;
      justify-content: center;
    
      min-height: 44px;   /* 跟 Google 地圖一致 */
      padding: 0 18px;    /* 只保留左右間距 */
    }

    @media (max-width: 600px) {
      .page {
        align-items: flex-start;
        padding-left: 12px;
        padding-right: 12px;
      }

      .card {
        margin: 0 auto;
        width: min(100%, calc((100svh - 44px) * 9 / 19.5));
        height: min(calc(100svh - 44px), calc((100vw - 24px) * 19.5 / 9));
        border-radius: 44px;
      }

      .card-scroll { padding: 24px 18px; }

      p, .info, .summary { font-size: 0.98rem; }

      .buttons {
        width: 100%;
        gap: 10px;
        margin-top: 22px;
      }

      .buttons button { width: 100%; }

      .map-links { grid-template-columns: 1fr 1fr; }

      .summary strong {
        display: block;
        min-width: 0;
        margin-top: 10px;
      }
    }

    @media (max-width: 390px) {
      .card-scroll { padding: 22px 16px; }
      h1 { letter-spacing: 0.05em; }
    }
  </style>
</head>

<body>

  <section id="page1" class="page">
    <div class="card">
      <div class="card-scroll">
      <h1>我們要結婚了</h1>
      <p>
        誠摯邀請您與我們一同見證人生中重要的時刻。
        請點選下方按鈕完成出席登記，讓我們能為您安排座位與餐點。
      </p>

      <div class="buttons">
        <button type="button" onclick="goToPage(2)">登記</button>
      </div>
      </div>
    </div>
  </section>

  <section id="page2" class="page">
    <div class="card">
      <div class="card-scroll">
      <h1>請協助填寫出席資訊</h1>

      <div class="info">
        <div><strong>日期：</strong><span id="page2Date"></span></div>
        <div><strong>時間：</strong><span id="page2Time"></span></div>
        <div><strong>宴客地點：</strong><span id="page2Location"></span></div>

        <div class="map-links">
          <a href="https://www.google.com/maps/place/%E5%98%89%F0%A0%AB%82/@25.1757864,121.4268743,17z/data=!4m6!3m5!1s0x3442a58fddc78345:0x3e5f1ce27904fdee!8m2!3d25.1757864!4d121.4294492!16s%2Fg%2F11fm5c0fb2?entry=ttu&g_ep=EgoyMDI2MDQyOS4wIKXMDSoASAFQAw%3D%3D" target="_blank">
            Google 地圖
          </a>
          <a href="https://maps.apple.com/?address=No.%20382%20Zhongzheng%20Rd,%20Tamsui%20District,%20New%20Taipei%20City%20251018,%20Taiwan&auid=5081677717952371797&ll=25.175772,121.429802&lsp=9902&q=%E8%B1%AA%E9%82%B8%E5%98%89%F0%A0%AB%82" target="_blank">
            Apple 地圖
          </a>
        </div>

        <div><strong>交通：</strong><span id="page2Traffic"></span></div>
      </div>

      <form id="rsvpForm">
        <label>請問您的大名：</label>
        <input type="text" id="guestName" required placeholder="請輸入姓名">

        <label>與新人的關係：</label>
        <select id="relationship" required>
          <option value="">請選擇</option>
          <option>🤵新郎親戚</option>
          <option>🤵新郎同學</option>
          <option>🤵新郎同事</option>
          <option>👰新娘親戚</option>
          <option>👰新娘同學</option>
          <option>👰新娘同事</option>
          <option>其他關係</option>
        </select>

        <label>是否出席婚宴：</label>
        <select id="attendance" required onchange="toggleAttendanceDetails()">
          <option value="">請選擇</option>
          <option value="true">⭕️ 出席</option>
          <option value="false">❌ 無法出席</option>
        </select>

        <div id="attendanceDetails" style="display:none;">
          <label>共幾個人出席：</label>
          <select id="guestCount"></select>

          <label>需要幾張兒童座椅：</label>
          <select id="childSeat"></select>

          <label>出席的賓客有幾位需要素食：</label>
          <select id="vegetarian"></select>
        </div>

        <div class="email-label-row">
          <label for="email">電子喜帖寄送 Email：</label>
          <span id="emailVerifyStatus">Email 尚未驗證</span>
        </div>
        <input type="email" id="email" required placeholder="example@email.com" oninput="resetEmailVerification()">

        <div class="buttons" style="margin-top: 12px;">
          <button type="button" onclick="sendEmailCode()">寄送驗證碼</button>
        </div>

        <div class="buttons">
          <button type="button" onclick="submitData()">送出</button>
        </div>
      </form>
      </div>
    </div>
  </section>

  <section id="page3" class="page">
    <div class="card">
      <div class="card-scroll">
      <div id="countdownWrap" class="countdown-wrap">
        <div class="countdown-title">距離婚宴所剩時間</div>
        <div class="countdown-grid">
          <div><div id="cdDays" class="countdown-number">0</div><div class="countdown-label">天</div></div>
          <div><div id="cdHours" class="countdown-number">0</div><div class="countdown-label">時</div></div>
          <div><div id="cdMinutes" class="countdown-number">0</div><div class="countdown-label">分</div></div>
          <div><div id="cdSeconds" class="countdown-number">0</div><div class="countdown-label">秒</div></div>
        </div>
      </div>

      <h1 id="page3Title">您的登記資料如下</h1>

      <p id="page3Intro">
        以下為您的出席登記資料。若需要調整內容，請點選下方「修改」。
      </p>

      <div class="summary" id="summary"></div>

      <div class="buttons" id="editButtonWrap">
        <button class="secondary" type="button" onclick="editData()">修改</button>
      </div>
      </div>
    </div>
  </section>

  <div id="customAlert" class="custom-alert">
    <div class="custom-alert-box">
      <h2>提醒</h2>
      <p id="customAlertText"></p>
      <button type="button" onclick="closeMessage()">知道了</button>
    </div>
  </div>

  <div id="emailCodeModal" class="custom-alert">
    <div class="custom-alert-box">
      <h2>輸入驗證碼</h2>
      <p>驗證碼已寄出，請至 Email 查看後輸入。</p>
      <input type="text" id="emailCode" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="請輸入 6 碼驗證碼">
      <div class="verify-modal-actions">
        <button type="button" onclick="verifyEmailCode()">確認</button>
        <button class="secondary" type="button" onclick="closeEmailCodeModal()">取消</button>
      </div>
    </div>
  </div>

  <div id="seatMapModal" class="seat-map-modal" onclick="closeSeatMap(event)">
    <div class="seat-map-box">
      <img id="seatMapImage" src="" alt="婚宴位置圖示">
      <button class="seat-map-close secondary" type="button" onclick="closeSeatMap()">關閉</button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxbvMX2U-kp1cxDMBZ-7EuQ39Ec6xCupT5pXutbDKn1U7FtaDrKHDCaVLz5owHGz3X87A/exec";

    const CONFIG = {
      wedding: "2026-11-07T12:00:00",
      editDeadline: "2026-10-07T00:00:00",
      thanksDate: "2026-11-11T00:00:00"
    };

    const WEDDING_LOCATION = "251新北市淡水區中正路382號";
    const WEDDING_TRAFFIC = "交通資訊將於確認後補充，您可先透過上方地圖連結查看宴客地點。";
    const GOOGLE_MAP_URL = "https://www.google.com/maps/place/%E5%98%89%F0%A0%AB%82/@25.1757864,121.4268743,17z/data=!4m6!3m5!1s0x3442a58fddc78345:0x3e5f1ce27904fdee!8m2!3d25.1757864!4d121.4294492!16s%2Fg%2F11fm5c0fb2?entry=ttu&g_ep=EgoyMDI2MDQyOS4wIKXMDSoASAFQAw%3D%3D";
    const APPLE_MAP_URL = "https://maps.apple.com/?address=No.%20382%20Zhongzheng%20Rd,%20Tamsui%20District,%20New%20Taipei%20City%20251018,%20Taiwan&auid=5081677717952371797&ll=25.175772,121.429802&lsp=9902&q=%E8%B1%AA%E9%82%B8%E5%98%89%F0%A0%AB%82";
    const SEAT_MAP_IMAGE_URL = "TableNo.PNG";
    const PHOTO_ALBUM_URL = "https://drive.google.com/drive/folders/1xt7F8LDUCh19NoDhAATHm-pxHNoySbqa?usp=sharing";

    const EDIT_LOCK_TIME = parseTaipeiTime(CONFIG.editDeadline);
    const WEDDING_START_TIME = parseTaipeiTime(CONFIG.wedding);
    const THANK_YOU_TIME = parseTaipeiTime(CONFIG.thanksDate);
    const WEDDING_DATE = formatChineseDate(WEDDING_START_TIME);
    const WEDDING_TIME = formatWeddingTime(WEDDING_START_TIME);
    let countdownTimer = null;

    let formData = {};
    let verifiedEmail = "";
    let isEmailVerified = false;
    let currentToken = "";
    let loadedFromToken = false;
    let serverEditClosed = null;
    let serverThankYouOpened = null;

    function showMessage(message) {
      document.getElementById("customAlertText").innerText = message;
      document.getElementById("customAlert").classList.add("active");
    }

    function closeMessage() {
      document.getElementById("customAlert").classList.remove("active");
    }

    function openEmailCodeModal() {
      document.getElementById("emailCodeModal").classList.add("active");
      window.setTimeout(() => document.getElementById("emailCode").focus(), 80);
    }

    function closeEmailCodeModal() {
      document.getElementById("emailCodeModal").classList.remove("active");
    }

    function openSeatMap() {
      document.getElementById("seatMapImage").src = SEAT_MAP_IMAGE_URL;
      document.getElementById("seatMapModal").classList.add("active");
    }

    function closeSeatMap(event) {
      if (event && event.target !== document.getElementById("seatMapModal")) return;
      document.getElementById("seatMapModal").classList.remove("active");
    }

    document.addEventListener("click", function (event) {
      const btn = event.target.closest("button");
      if (!btn) return;
      btn.classList.add("pressed");
      window.setTimeout(() => btn.classList.remove("pressed"), 160);
    });

    function parseTaipeiTime(value) {
      return new Date(value + "+08:00");
    }

    function pad2(num) {
      return String(num).padStart(2, "0");
    }

    function formatChineseDate(date) {
      const weekNames = ["日", "一", "二", "三", "四", "五", "六"];
      return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日（${weekNames[date.getDay()]}）`;
    }

    function formatWeddingTime(date) {
      const startHour = pad2(date.getHours());
      const startMinute = pad2(date.getMinutes());
      const mealStart = new Date(date.getTime() + 30 * 60 * 1000);
      return `${startHour}:${startMinute} 婚宴入席　${pad2(mealStart.getHours())}:${pad2(mealStart.getMinutes())} 婚宴開始`;
    }

    function updateStaticWeddingInfo() {
      document.getElementById("page2Date").innerText = WEDDING_DATE;
      document.getElementById("page2Time").innerText = WEDDING_TIME;
      document.getElementById("page2Location").innerText = WEDDING_LOCATION;
      document.getElementById("page2Traffic").innerText = WEDDING_TRAFFIC;
    }


    function getTokenFromUrl() {
      const searchToken = new URLSearchParams(window.location.search).get("token");
      if (searchToken) return searchToken;

      const hashText = window.location.hash.replace("#", "");
      const hashToken = new URLSearchParams(hashText).get("token");
      if (hashToken) return hashToken;

      return "";
    }

    function initNumberSelects() {
      const ids = ["guestCount", "childSeat", "vegetarian"];

      ids.forEach(id => {
        const select = document.getElementById(id);
        select.innerHTML = "";

        for (let i = 0; i <= 20; i++) {
          const option = document.createElement("option");
          option.value = i;
          option.textContent = i;
          select.appendChild(option);
        }
      });

      document.getElementById("guestCount").value = 1;
      document.getElementById("childSeat").value = 0;
      document.getElementById("vegetarian").value = 0;
    }

    function goToPage(pageNumber) {
      document.querySelectorAll(".page").forEach(page => {
        page.classList.remove("active");
      });

      const targetPage = document.getElementById("page" + pageNumber);
      targetPage.classList.add("active");

      const scrollBox = targetPage.querySelector(".card-scroll");
      if (scrollBox) scrollBox.scrollTo({ top: 0, behavior: "smooth" });
    }

    function editData() {
      if (isAfterEditLock()) {
        showMessage("登記資料已停止修改。若有問題，請直接回覆 Email 與新人聯繫。");
        updatePage3Mode(formData);
        return;
      }

      fillFormData(formData);
      goToPage(2);
    }

    function isAttending() {
      return document.getElementById("attendance").value === "true";
    }

    function toggleAttendanceDetails() {
      const details = document.getElementById("attendanceDetails");
      const guestCount = document.getElementById("guestCount");
      const childSeat = document.getElementById("childSeat");
      const vegetarian = document.getElementById("vegetarian");

      if (isAttending()) {
        details.style.display = "block";
        guestCount.required = true;
        childSeat.required = true;
        vegetarian.required = true;

        if (Number(guestCount.value) < 1) {
          guestCount.value = 1;
        }
      } else {
        details.style.display = "none";
        guestCount.required = false;
        childSeat.required = false;
        vegetarian.required = false;

        guestCount.value = 0;
        childSeat.value = 0;
        vegetarian.value = 0;
      }
    }

    function resetEmailVerification() {
      const currentEmail = document.getElementById("email").value.trim();

      if (currentEmail !== verifiedEmail) {
        isEmailVerified = false;

        const status = document.getElementById("emailVerifyStatus");
        status.innerText = "Email 尚未驗證";
        status.style.color = "#b65b00";
      }
    }

    function isAfterEditLock() {
      return serverEditClosed === null ? new Date() >= EDIT_LOCK_TIME : serverEditClosed;
    }

    function isAfterThankYouTime() {
      return serverThankYouOpened === null ? new Date() >= THANK_YOU_TIME : serverThankYouOpened;
    }

    function updatePage3Mode(data) {
      const title = document.getElementById("page3Title");
      const intro = document.getElementById("page3Intro");
      const editWrap = document.getElementById("editButtonWrap");
      const page3Card = document.querySelector("#page3 .card");

      if (isAfterThankYouTime()) {
        if (page3Card) page3Card.classList.add("thanks-bg");
        title.innerText = "誠摯感謝";
        intro.innerText = "謝謝您撥冗參與我們的人生重要時刻。宴客當天照片可透過下方連結觀賞，並選擇您喜歡的照片下載。";
        editWrap.style.display = "none";
        renderThankYou();
        return;
      }

      if (page3Card) page3Card.classList.remove("thanks-bg");

      if (isAfterEditLock()) {
        title.innerText = "座位訊息如下";
        intro.innerText = "請賓客準時入席。若有問題，請直接回覆 Email 與我們聯繫。";
        editWrap.style.display = "none";
        editWrap.hidden = true;
      } else {
        title.innerText = "您的登記資料如下";
        intro.innerText = "以下為您的出席登記資料。若需要調整內容，請點選下方「修改」。";
        editWrap.style.display = "flex";
        editWrap.hidden = false;
      }

      renderSummary(data);
    }

    function renderThankYou() {
      document.getElementById("summary").innerHTML = `
        <div class="summary-section">
          <div>良辰已過，喜悅長存。</div>
          <div>誠摯感謝您蒞臨我們的婚宴，與我們一同留下珍貴回憶。</div>
        </div>

        <div>
          <div><strong>宴客照片：</strong></div>
          <a class="photo-link" href="${PHOTO_ALBUM_URL}" target="_blank" rel="noopener">觀賞與下載照片</a>
        </div>
      `;
    }

    function attendanceText(value) {
      return normalizeAttendance(value) ? "⭕️ 出席" : "❌ 無法出席";
    }

    function normalizeAttendance(value) {
      return value === true || value === "true" || value === "TRUE" || value === "⭕️ 出席" || value === "出席";
    }

    function renderSummary(data) {
      const showLockedInfo = isAfterEditLock();
      const tableNoHtml = showLockedInfo
        ? `
          <div>
            <div><strong>桌號：</strong></div>
            <div style="display:flex; align-items:center; flex-wrap:nowrap;">
              <span>${data.tableNo || "尚未公告"}</span>
              <a href="javascript:void(0)" onclick="openSeatMap()" class="seat-map-link">座位引導圖</a>
            </div>
          </div>
        `
        : "";

      const seatMapHtml = "";

      document.getElementById("summary").innerHTML = `
        <div class="summary-section">
          <div><strong>日期：</strong>${WEDDING_DATE}</div>
          <div><strong>時間：</strong>${WEDDING_TIME}</div>
          <div><strong>宴客地點：</strong>${WEDDING_LOCATION}</div>

          <div class="map-links">
            <a href="${GOOGLE_MAP_URL}" target="_blank" rel="noopener">Google 地圖</a>
            <a href="${APPLE_MAP_URL}" target="_blank" rel="noopener">Apple 地圖</a>
          </div>

          <div><strong>交通：</strong>${WEDDING_TRAFFIC}</div>
        </div>

        <div>
          ${tableNoHtml}
          ${seatMapHtml}
          <div><strong>姓名：</strong>${data.name || ""}</div>
          <div><strong>與新人關係：</strong>${data.relationship || ""}</div>
          <div><strong>是否出席：</strong>${attendanceText(data.attendance)}</div>
          <div><strong>出席人數：</strong>${data.guestCount ?? 0}</div>
          <div><strong>兒童座椅：</strong>${data.childSeat ?? 0}</div>
          <div><strong>素食人數：</strong>${data.vegetarian ?? 0}</div>
        </div>
      `;
    }

    function renderClosedRegistration() {
      const title = document.getElementById("page3Title");
      const intro = document.getElementById("page3Intro");
      const editWrap = document.getElementById("editButtonWrap");
      const page3Card = document.querySelector("#page3 .card");
      if (page3Card) page3Card.classList.remove("thanks-bg");

      title.innerText = "結束登記";
      intro.innerText = "婚宴出席登記已截止。若已完成登記，請使用 Email 中的專屬連結查看婚宴資訊。";
      editWrap.style.display = "none";
    }

    function updateCountdown() {
      const wrap = document.getElementById("countdownWrap");
      const now = new Date();

      if (now >= WEDDING_START_TIME || now >= THANK_YOU_TIME) {
        wrap.style.display = "none";
        if (countdownTimer) clearInterval(countdownTimer);
        return;
      }

      const diff = WEDDING_START_TIME - now;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("cdDays").innerText = days;
      document.getElementById("cdHours").innerText = hours;
      document.getElementById("cdMinutes").innerText = minutes;
      document.getElementById("cdSeconds").innerText = seconds;
      wrap.style.display = "block";
    }

    function startCountdown() {
      updateCountdown();
      if (countdownTimer) clearInterval(countdownTimer);
      countdownTimer = setInterval(updateCountdown, 1000);
    }

    function fillFormData(data) {
      document.getElementById("guestName").value = data.name || "";
      document.getElementById("relationship").value = data.relationship || "";
      document.getElementById("attendance").value = normalizeAttendance(data.attendance) ? "true" : "false";

      document.getElementById("guestCount").value = String(Number(data.guestCount || 0));
      document.getElementById("childSeat").value = String(Number(data.childSeat || 0));
      document.getElementById("vegetarian").value = String(Number(data.vegetarian || 0));
      document.getElementById("email").value = data.email || "";

      isEmailVerified = true;
      verifiedEmail = data.email || "";

      const status = document.getElementById("emailVerifyStatus");
      status.innerText = "Email 已驗證";
      status.style.color = "green";

      toggleAttendanceDetails();
    }

    function collectAndValidateForm() {
      const form = document.getElementById("rsvpForm");

      if (!form.checkValidity()) {
        form.reportValidity();
        return null;
      }

      const name = document.getElementById("guestName").value.trim();
      const relationship = document.getElementById("relationship").value;
      const attendanceValue = document.getElementById("attendance").value;
      const attendance = attendanceValue === "true";
      const email = document.getElementById("email").value.trim();

      let guestCount = 0;
      let childSeat = 0;
      let vegetarian = 0;

      if (!name) {
        showMessage("請填寫您的大名");
        return null;
      }

      if (!relationship) {
        showMessage("請選擇與新人的關係");
        return null;
      }

      if (attendanceValue === "") {
        showMessage("請選擇是否出席婚宴");
        return null;
      }

      if (isAttending()) {
        guestCount = Number(document.getElementById("guestCount").value);
        childSeat = Number(document.getElementById("childSeat").value);
        vegetarian = Number(document.getElementById("vegetarian").value);

        if (guestCount < 1) {
          showMessage("出席人數至少為 1 人");
          return null;
        }

        if (childSeat > guestCount) {
          showMessage("兒童座椅數量不可大於出席人數");
          return null;
        }

        if (vegetarian > guestCount) {
          showMessage("素食人數不可大於出席人數");
          return null;
        }
      }

      if (!email) {
        showMessage("請填寫 Email");
        return null;
      }

      if (!isEmailVerified || email !== verifiedEmail) {
        showMessage("請先完成 Email 驗證");
        return null;
      }

      return {
        name,
        relationship,
        attendance,
        guestCount,
        childSeat,
        vegetarian,
        email
      };
    }

    function sendEmailCode() {
      const emailInput = document.getElementById("email");
      const status = document.getElementById("emailVerifyStatus");

      if (!emailInput.checkValidity()) {
        emailInput.reportValidity();
        return;
      }

      const email = emailInput.value.trim();

      if (!email) {
        showMessage("請先填寫 Email");
        return;
      }

      status.innerText = "驗證碼寄送中...";
      status.style.color = "#7b4f3a";

      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "sendCode",
          email: email
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === "success") {
          isEmailVerified = false;
          verifiedEmail = "";
          document.getElementById("emailCode").value = "";

          status.innerText = "Email 尚未驗證";
          status.style.color = "#b65b00";

          openEmailCodeModal();
        } else {
          status.innerText = "驗證碼寄送失敗";
          status.style.color = "red";
          showMessage(data.message || "驗證碼寄送失敗");
        }
      })
      .catch(err => {
        console.error(err);
        status.innerText = "驗證碼寄送失敗";
        status.style.color = "red";
        showMessage("驗證碼寄送失敗，請稍後再試");
      });
    }

    function verifyEmailCode() {
      const email = document.getElementById("email").value.trim();
      const code = document.getElementById("emailCode").value.trim();
      const status = document.getElementById("emailVerifyStatus");

      if (!email) {
        showMessage("請先填寫 Email");
        return;
      }

      if (!code) {
        showMessage("請輸入驗證碼");
        return;
      }

      status.innerText = "驗證中...";
      status.style.color = "#7b4f3a";

      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "verifyCode",
          email: email,
          code: code
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === "success") {
          isEmailVerified = true;
          verifiedEmail = email;

          status.innerText = "Email 已驗證";
          status.style.color = "green";

          closeEmailCodeModal();
        } else {
          isEmailVerified = false;
          verifiedEmail = "";

          status.innerText = data.message || "驗證碼錯誤或已失效";
          status.style.color = "red";
          document.getElementById("emailCode").focus();
        }
      })
      .catch(err => {
        console.error(err);
        isEmailVerified = false;

        status.innerText = "驗證失敗，請稍後再試";
        status.style.color = "red";
      });
    }

    function submitData() {
      const data = collectAndValidateForm();
      if (!data) return;

      formData = data;

      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "submit",
          token: currentToken,
          ...formData
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === "success") {
          if (data.token) {
            currentToken = data.token;
          }

          updatePage3Mode(formData);
          startCountdown();
          goToPage(3);
          showMessage("登記資料已送出。");
        } else {
          showMessage(data.message || "送出失敗，請稍後再試。");
        }
      })
      .catch(err => {
        console.error(err);
        showMessage("送出失敗，請確認網路或稍後再試。");
      });
    }

    window.addEventListener("load", function () {
      initNumberSelects();
      updateStaticWeddingInfo();

      currentToken = getTokenFromUrl();
      loadedFromToken = Boolean(currentToken);

      if (currentToken) {
        fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "getData",
            token: currentToken
          })
        })
        .then(res => res.json())
        .then(data => {
          if (data.status === "success") {
            serverEditClosed = Boolean(data.editClosed);
            serverThankYouOpened = Boolean(data.thankYouOpened);
            const d = data.data;

            formData = {
              name: d.name || "",
              relationship: d.relationship || "",
              attendance: normalizeAttendance(d.attendance),
              guestCount: Number(d.guestCount || 0),
              childSeat: Number(d.childSeat || 0),
              vegetarian: Number(d.vegetarian || 0),
              email: d.email || "",
              tableNo: d.tableNo || ""
            };

            fillFormData(formData);
            updatePage3Mode(formData);
            startCountdown();
            goToPage(3);
          } else {
            showMessage("查無登記資料，請重新填寫。");
            goToPage(2);
          }
        })
        .catch(err => {
          console.error(err);
          showMessage("載入登記資料失敗，請稍後再試。");
          goToPage(2);
        });
      } else if (isAfterEditLock()) {
        renderClosedRegistration();
        startCountdown();
        goToPage(3);
      } else {
        goToPage(1);
        toggleAttendanceDetails();
      }
    });
  </script>

</body>
</html>
